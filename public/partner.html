<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Partner – MyPahad</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--g:#1a5c3a;--gl:#e8f5ee;--ac:#e05a2b;--bg:#f0f0ee;--s:#fff;--t:#111;--t2:#4a4a4a;--t3:#888;--bd:#ddd;--r:5px;--rs:3px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:13px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;font-size:12px;width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--rs);background:#fff;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--g);}
label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px;}
.hidden{display:none!important;}
.fg{margin-bottom:9px;}
.err{color:#c00;font-size:11px;margin-top:3px;}
body::before{content:'';position:fixed;top:-50px;right:-50px;width:170px;height:170px;background:var(--g);border-radius:30px;opacity:0.06;z-index:0;pointer-events:none;}
.shim{background:linear-gradient(90deg,#eee 25%,#e2e2e2 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:6px 14px;border-radius:14px;z-index:9999;font-size:11px;display:none;white-space:nowrap;}

.nav{background:var(--g);display:flex;align-items:center;gap:7px;padding:6px 10px;position:sticky;top:0;z-index:100;}
.nav-logo{height:22px;width:auto;}
.nav-biz{font-size:12px;color:#fff;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
/* Logout tucked away */
.nav-menu{position:relative;}
.nav-dots{background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.7);padding:4px 7px;border-radius:var(--rs);font-size:14px;line-height:1;}
.nav-dropdown{position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid var(--bd);border-radius:var(--rs);min-width:100px;z-index:200;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.nav-dropdown.open{display:block;}
.nav-dropdown button{display:block;width:100%;text-align:left;padding:8px 12px;font-size:12px;background:none;border:none;color:var(--t);border-bottom:1px solid var(--bd);}
.nav-dropdown button:last-child{border-bottom:none;color:#c00;}

.auth-hero{background:var(--g);padding:16px 12px 12px;text-align:center;}
.auth-hero img{height:28px;width:auto;margin-bottom:6px;}
.auth-hero p{color:rgba(255,255,255,0.65);font-size:10px;}
.auth-card{background:#fff;padding:14px;max-width:400px;margin:0 auto;}
.atabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:12px;}
.atab{flex:1;text-align:center;padding:7px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.atab.on{color:var(--g);border-bottom-color:var(--g);}
.btn-pri{background:var(--g);color:#fff;border:none;padding:9px;border-radius:var(--rs);font-size:12px;font-weight:600;width:100%;}
.btn-sec{background:#fff;color:var(--t);border:1px solid var(--bd);padding:7px 12px;border-radius:var(--rs);font-size:12px;}
.lnk{color:var(--g);font-size:11px;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;}

.dash{position:relative;z-index:1;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);display:flex;z-index:100;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:5px 2px;cursor:pointer;color:var(--t3);font-size:9px;gap:2px;}
.bni.on{color:var(--g);}
.dc{padding:10px;padding-bottom:68px;}

.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:600;}
.bpend{background:#fff3cd;color:#856404;}
.bappr{background:#d4edda;color:#155724;}
.bprem{background:#cce5ff;color:#004085;}
.bdang{background:#f8d7da;color:#721c24;}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px;}
.sbox{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:8px;text-align:center;}
.snum{font-size:18px;font-weight:700;color:var(--g);}
.slbl{font-size:9px;color:var(--t3);margin-top:1px;}

/* CHART */
.chart-wrap{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px;}
.chart-title{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:8px;}
.chart-canvas{width:100%!important;height:130px!important;}

/* CARDS */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:7px;}
.ctitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--t3);margin-bottom:7px;}

/* LISTING ROW */
.lrow{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:7px 9px;margin-bottom:5px;display:flex;align-items:center;gap:7px;}
.lthumb{width:40px;height:40px;border-radius:var(--rs);object-fit:cover;background:var(--gl);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.lthumb img{width:40px;height:40px;border-radius:var(--rs);object-fit:cover;}
.linfo{flex:1;min-width:0;}
.lname{font-size:12px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.lmeta{font-size:10px;color:var(--t3);margin-top:1px;}
.lact{display:flex;gap:3px;}
.bedit{background:var(--gl);color:var(--g);border:none;padding:3px 8px;border-radius:var(--rs);font-size:11px;font-weight:600;}
.bdel{background:#fde;color:#c00;border:none;padding:3px 7px;border-radius:var(--rs);font-size:11px;}

/* PHOTOS */
.phgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.phitem{position:relative;width:72px;height:54px;}
.phitem img{width:72px;height:54px;border-radius:var(--rs);object-fit:cover;}
.phdel{position:absolute;top:-3px;right:-3px;background:#c00;color:#fff;border:none;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;line-height:1;}

/* PLAN COMPARISON */
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.plan-col{padding:10px 8px;}
.plan-col.free{background:#fff;}
.plan-col.prem{background:var(--g);color:#fff;}
.plan-head{font-size:12px;font-weight:700;margin-bottom:2px;}
.plan-price{font-size:10px;margin-bottom:8px;opacity:0.7;}
.plan-feat{display:flex;align-items:flex-start;gap:5px;margin-bottom:5px;font-size:11px;line-height:1.3;}
.plan-feat svg{flex-shrink:0;margin-top:1px;}
.plan-feat.yes{color:var(--t2);}
.plan-feat.no{color:var(--t3);}
.plan-feat.pyes{color:rgba(255,255,255,0.9);}
.plan-divider{width:1px;background:var(--bd);}

/* PAGINATION */
.pgrow{display:flex;align-items:center;justify-content:center;gap:7px;padding:6px 0 2px;}
.pgb{background:#fff;border:1px solid var(--bd);padding:4px 12px;border-radius:var(--rs);font-size:11px;color:var(--t2);}
.pgb:disabled{opacity:0.35;}
.pgi{font-size:10px;color:var(--t3);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.42);z-index:200;overflow-y:auto;}
.mbox{background:#fff;max-width:460px;margin:30px auto 20px;border-radius:var(--r);padding:14px;position:relative;}
.mtitle{font-size:14px;font-weight:600;margin-bottom:10px;padding-right:22px;}
.mclose{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;color:var(--t3);}
.mftr{display:flex;gap:6px;margin-top:10px;}
.dp-prev{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--g);display:none;margin-top:5px;}
.img-prev{width:70px;height:70px;border-radius:var(--rs);object-fit:cover;display:none;margin-top:5px;}

/* CATEGORY AUTOCOMPLETE */
.cac-wrap{position:relative;}
.cac-inp{width:100%;}
.cac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--g);border-radius:var(--rs);z-index:300;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.cac-drop.open{display:block;}
.cac-item{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;}
.cac-item:last-child{border-bottom:none;}
.cac-item:active,.cac-item:hover{background:var(--gl);}
.cac-item-new{color:var(--g);font-weight:600;}
.cac-item-new::after{content:'+ Create';font-size:10px;background:var(--gl);color:var(--g);padding:1px 5px;border-radius:2px;margin-left:6px;}
.cac-pill{display:inline-flex;align-items:center;gap:4px;background:var(--gl);color:var(--g);border:1px solid #b5d9c5;border-radius:var(--rs);padding:2px 7px 2px 8px;font-size:11px;font-weight:600;margin-top:4px;}
.cac-pill button{background:none;border:none;color:var(--g);font-size:13px;line-height:1;padding:0;cursor:pointer;margin-left:1px;}
</style>
</head>
<body>
<div id="toast"></div>

    </div>

<!-- LISTING MODAL -->
<div id="lmod" class="mo hidden">
  <div class="mbox">
    <button class="mclose" onclick="closeMod('lmod')">×</button>
    <div class="mtitle" id="lmod-title">Add Listing</div>
    <input type="hidden" id="eid"/>
    <div class="fg"><label>Type</label><select id="etype"><option value="product">Product</option><option value="service">Service</option></select></div>
    <div class="fg"><label>Name *</label><input type="text" id="ename" placeholder="e.g. Pahadi Honey 500g"/></div>
    <div class="fg">
      <label>Category</label>
      <div class="cac-wrap" id="ecac-wrap">
        <input type="text" class="cac-inp" id="ecac-inp" placeholder="e.g. Dairy, Clothing, Repair…" autocomplete="off" oninput="catAC('ecac',this.value)" onfocus="catAC('ecac',this.value)"/>
        <div class="cac-drop" id="ecac-drop"></div>
      </div>
      <input type="hidden" id="ecac-id"/>

    <div class="mftr"><button class="btn-pri" onclick="saveLst()">Save</button><button class="btn-sec" onclick="closeMod('lmod')">Cancel</button></div>

<script>
const SU='https://khbotkadtbkwqxjxlyhm.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoYm90a2FkdGJrd3F4anhseWhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTU4OTAsImV4cCI6MjA4ODUzMTg5MH0.MnNTuoONyBTGZeO1qYyRUTtkRdFreK0OrOcYk66pWxs';
const {createClient}=supabase;const sb=createClient(SU,SK);
let cu=null,biz=null;
const LPS=10;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2200);}
function openMod(id){document.getElementById(id).classList.remove('hidden');}
function closeMod(id){document.getElementById(id).classList.add('hidden');}
function toggleMenu(){document.getElementById('nav-dd').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.nav-menu'))document.getElementById('nav-dd')?.classList.remove('open');});

function authTab(t){
  document.getElementById('atab-login').classList.toggle('on',t==='login');
  document.getElementById('atab-reg').classList.toggle('on',t==='reg');
  document.getElementById('flogin').classList.toggle('hidden',t!=='login');
  document.getElementById('freg').classList.toggle('hidden',t!=='reg');
}

async function compress(file,kb=100){
  return new Promise(res=>{
    const r=new FileReader();r.onload=e=>{
      const img=new Image();img.onload=()=>{
        const c=document.createElement('canvas');let w=img.width,h=img.height,mx=800;
        if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
        c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
        let q=0.85;const go=()=>{const d=c.toDataURL('image/webp',q);if((d.length*3/4)/1024>kb&&q>0.1){q-=0.1;go();}else res(d);};go();
      };img.src=e.target.result;
    };r.readAsDataURL(file);
  });
}
function prvImg(inp,pid){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const p=document.getElementById(pid);p.src=e.target.result;p.style.display='block';};r.readAsDataURL(f);}

async function loadInit(){
  const {data:areas}=await sb.from('areas').select('*').eq('is_active',true).order('name');
  const ra=document.getElementById('rarea');
  areas?.forEach(a=>ra.appendChild(new Option(a.name,a.id)));
  // Pre-load category cache
  await refreshCatCache();
}

async function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  document.getElementById('lerr').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){document.getElementById('lerr').textContent=error.message;return;}
  cu=data.user;await loadDash();
}

async function doReg(){
  const name=document.getElementById('rname').value.trim(),uname=document.getElementById('ruser').value.trim().toLowerCase();
  const areaId=document.getElementById('rarea').value,catId=document.getElementById('rcac-id').value;
  const type=document.getElementById('rtype').value,wa=document.getElementById('rwa').value.trim();
  const ph=document.getElementById('rph').value.trim(),addr=document.getElementById('raddr').value.trim();
  const desc=document.getElementById('rdesc').value.trim(),email=document.getElementById('remail').value.trim();
  const pass=document.getElementById('rpass').value,err=document.getElementById('rerr');
  err.textContent='';
  if(!name||!areaId||!wa||!email||!pass){err.textContent='Please fill all required fields.';return;}
  if(pass.length<6){err.textContent='Password min 6 characters.';return;}
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;return;}
  const uid=data.user?.id;if(!uid){err.textContent='Account creation failed.';return;}
  await sb.from('businesses').insert({user_id:uid,area_id:areaId,business_name:name,username:uname||null,category_id:catId||null,type,whatsapp:wa,phone:ph||null,address:addr||null,description:desc||null,is_approved:false,is_active:true});
  if(data.session){cu=data.user;toast('Welcome to MyPahad!');await loadDash();}
  else{toast('Check your email for confirmation, then login.');authTab('login');document.getElementById('le').value=email;}
}

async function doForgot(){
  const e=document.getElementById('le').value.trim();
  if(!e){toast('Enter your email first.');return;}
  await sb.auth.resetPasswordForEmail(e,{redirectTo:'https://mypahad.in/partner.html'});
  toast('Reset email sent!');
}

async function doLogout(){await sb.auth.signOut();cu=null;biz=null;document.getElementById('page-dash').classList.add('hidden');document.getElementById('page-auth').classList.remove('hidden');}

// ===== CATEGORY AUTOCOMPLETE ENGINE =====
let _catCache=[];   // {id, name}
let _catTimer=null;

async function refreshCatCache(){
  const {data}=await sb.from('categories').select('id,name').order('name');
  _catCache=data||[];
}

function catAC(prefix, val){
  const drop=document.getElementById(prefix+'-drop');
  const q=(val||'').trim().toLowerCase();
  // filter local cache
  const matches=_catCache.filter(c=>c.name.toLowerCase().includes(q));
  // check exact match
  const exactMatch=_catCache.find(c=>c.name.toLowerCase()===q);
  drop.innerHTML='';
  // Existing matches
  matches.slice(0,8).forEach(c=>{
    const d=document.createElement('div');d.className='cac-item';
    d.textContent=c.name;
    d.onmousedown=(e)=>{e.preventDefault();setCac(prefix,c.id,c.name);};
    drop.appendChild(d);
  });
  // "Create new" option if typed something and no exact match
  if(q.length>=2 && !exactMatch){
    const d=document.createElement('div');d.className='cac-item cac-item-new';
    d.textContent=val.trim();
    d.onmousedown=(e)=>{e.preventDefault();createAndSetCac(prefix,val.trim());};
    drop.appendChild(d);
  }
  drop.classList.toggle('open', drop.children.length>0 && document.getElementById(prefix+'-inp')===document.activeElement);
}

async function createAndSetCac(prefix, name){
  const trimmed=name.trim();
  // Check if exists (race condition guard)
  const {data:ex}=await sb.from('categories').select('id,name').ilike('name',trimmed);
  if(ex&&ex.length){setCac(prefix,ex[0].id,ex[0].name);await refreshCatCache();return;}
  // Generate slug: lowercase, replace spaces/special chars with hyphens
  const slug=trimmed.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
  const {data:inserted,error}=await sb.from('categories').insert({name:trimmed,slug}).select().single();
  if(error){toast('Could not create category: '+error.message);return;}
  _catCache.push({id:inserted.id,name:inserted.name});
  _catCache.sort((a,b)=>a.name.localeCompare(b.name));
  setCac(prefix,inserted.id,inserted.name);
  toast('Category "'+inserted.name+'" created!');
}

function setCac(prefix, id, name){
  document.getElementById(prefix+'-id').value=id;
  document.getElementById(prefix+'-inp').value='';
  document.getElementById(prefix+'-drop').classList.remove('open');
  const pill=document.getElementById(prefix+'-pill');
  pill.innerHTML=`<span class="cac-pill">${name}<button type="button" onclick="clearCac('${prefix}')">×</button></span>`;
}

function clearCac(prefix){
  document.getElementById(prefix+'-id').value='';
  document.getElementById(prefix+'-inp').value='';
  document.getElementById(prefix+'-pill').innerHTML='';
  document.getElementById(prefix+'-drop').classList.remove('open');
}

async function initCacFromId(prefix, id){
  // Look up name from cache first, then DB
  let cat=_catCache.find(c=>c.id===id);
  if(!cat){const {data}=await sb.from('categories').select('id,name').eq('id',id).single();cat=data;}
  if(cat) setCac(prefix,cat.id,cat.name);
}

async function chkUser(v,sid='ustat'){

  if(!/^[a-z0-9_]+$/.test(v)){el.textContent='Only a–z, 0–9, _';el.style.color='red';return;}
  ut=setTimeout(async()=>{
    const {data}=await sb.from('businesses').select('id').eq('username',v);
    const taken=data&&data.some(b=>b.id!==biz?.id);
    el.textContent=taken?'Taken':'Available';el.style.color=taken?'red':'green';
  },500);
}

// ===== INIT =====
async function init(){
  await loadInit();
  const {data:{session}}=await sb.auth.getSession();
  if(session){cu=session.user;await loadDash();}
}
window.addEventListener('DOMContentLoaded',init);
</script>
