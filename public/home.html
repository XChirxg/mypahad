<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MyPahad</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g:#1a5c3a;--gl:#e8f5ee;--ac:#e05a2b;--bg:#f0f0ee;--s:#fff;--t:#111;--t2:#4a4a4a;--t3:#888;--bd:#ddd;--r:6px;--rs:4px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:13px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;padding-bottom:60px;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;}
input{font-family:inherit;}
.shim{background:linear-gradient(90deg,#eee 25%,#e2e2e2 50%,#eee 75%);background-size:200% 100%;animation:sh 1.2s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:7px 16px;border-radius:20px;z-index:9999;font-size:11px;display:none;white-space:nowrap;}

/* TOP NAV */
.topnav{background:var(--g);padding:7px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;}
.topnav-logo{height:22px;width:auto;cursor:pointer;}
.topnav-logo-text{font-size:16px;font-weight:700;color:#fff;cursor:pointer;}
.topnav-area{font-size:10px;color:rgba(255,255,255,0.6);flex:1;}
.topnav-change{background:rgba(255,255,255,0.16);color:#fff;border:none;padding:4px 9px;border-radius:var(--rs);font-size:11px;}

/* FILTER CHIPS */
.frow{display:flex;gap:5px;overflow-x:auto;padding:7px 10px;background:#fff;border-bottom:1px solid var(--bd);scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:3px 10px;border-radius:var(--rs);border:1px solid var(--bd);background:#fff;font-size:11px;color:var(--t2);flex-shrink:0;}
.chip.on{background:var(--g);color:#fff;border-color:var(--g);}

/* STORIES ROW */
.srow{overflow-x:auto;display:flex;gap:6px;padding:8px 10px;background:#fff;border-bottom:1px solid var(--bd);scrollbar-width:none;}
.srow::-webkit-scrollbar{display:none;}
.si{flex-shrink:0;text-align:center;width:48px;cursor:pointer;}
.sav{width:42px;height:42px;border-radius:50%;border:2px solid var(--g);overflow:hidden;margin:0 auto 3px;}
.sav img{width:100%;height:100%;object-fit:cover;}
.savph{width:100%;height:100%;background:var(--gl);display:flex;align-items:center;justify-content:center;}
.snm{font-size:8px;color:var(--t2);line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

/* AD */
.adw{margin:7px 10px;border-radius:var(--r);overflow:hidden;}
.adw img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}

/* SPONSORED */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 5px;background:#fff;}
.stitle{font-size:12px;font-weight:600;}
.scount{font-size:10px;color:var(--t3);}
.hscroll{display:flex;gap:6px;overflow-x:auto;padding:0 10px 8px;background:#fff;border-bottom:1px solid var(--bd);scrollbar-width:none;}
.hscroll::-webkit-scrollbar{display:none;}
.hc{flex-shrink:0;width:100px;background:var(--bg);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;}
.hcimg{width:100%;height:70px;object-fit:cover;background:var(--gl);}
.hcph{width:100%;height:70px;background:var(--gl);display:flex;align-items:center;justify-content:center;}
.hcb{padding:4px 5px 6px;}
.hcn{font-size:10px;font-weight:500;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3;}
.hcprice{font-size:10px;color:var(--g);font-weight:600;margin-top:1px;}

/* LISTINGS SECTION */
.lst-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 5px;}
.lst-ttl{font-size:12px;font-weight:600;}
.lst-cnt{font-size:10px;color:var(--t3);}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px 6px;}
.gc{background:#fff;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;}
.gcimg{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg);}
.gcph{width:100%;aspect-ratio:1;background:var(--gl);display:flex;align-items:center;justify-content:center;}
.gcb{padding:4px 5px 6px;}
.gcn{font-size:10px;font-weight:500;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.gcp{font-size:10px;color:var(--g);font-weight:600;margin-top:1px;}
.gcbz{font-size:9px;color:var(--t3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:1px;}
.empty{text-align:center;padding:28px 10px;color:var(--t3);font-size:12px;grid-column:1/-1;}
.pgrow{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 10px;}
.pgb{background:#fff;border:1px solid var(--bd);padding:5px 14px;border-radius:var(--rs);font-size:11px;color:var(--t2);}
.pgb:disabled{opacity:0.35;}
.pgi{font-size:10px;color:var(--t3);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e8;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 6px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--t3);font-size:9px;gap:3px;}
.bnav-item.active{color:var(--g);}
</style>
</head>
<body>
<div id="toast"></div>

<div class="topnav">
  <img src="logo.png" class="topnav-logo" alt="MyPahad" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
  <span class="topnav-logo-text" style="display:none">MyPahad</span>
  <span class="topnav-area" id="topnav-area"></span>
  <button class="topnav-change" onclick="window.location.href='index.html'">Change</button>
</div>

<div class="frow">
  <button class="chip on" onclick="setFilter(null,null,this)">All</button>
  <button class="chip" onclick="setFilter('product',null,this)">Products</button>
  <button class="chip" onclick="setFilter('service',null,this)">Services</button>
</div>

<div class="srow" id="srow"></div>

<div id="adw" style="display:none;"><div class="adw" id="adinner"></div></div>

<div id="sponw" style="display:none;">
  <div class="shdr"><span class="stitle">Sponsored</span></div>
  <div class="hscroll" id="sponlist"></div>
</div>

<div class="lst-hdr">
  <span class="lst-ttl" id="lstlbl">All Listings</span>
  <span class="lst-cnt" id="lstcnt"></span>
</div>
<div class="g3" id="g3"></div>
<div class="pgrow" id="pgrow" style="display:none;">
  <button class="pgb" id="pgprev" onclick="changePg(-1)">← Prev</button>
  <span class="pgi" id="pgi"></span>
  <button class="pgb" id="pgnext" onclick="changePg(1)">Next →</button>
</div>
<div style="height:8px;"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-item active" onclick="window.location.href='home.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Home
  </button>
  <button class="bnav-item" onclick="window.location.href='search.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search
  </button>
  <button class="bnav-item" onclick="window.location.href='businesses.html'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    Businesses
  </button>
</nav>

<script>
const SU='https://khbotkadtbkwqxjxlyhm.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoYm90a2FkdGJrd3F4anhseWhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTU4OTAsImV4cCI6MjA4ODUzMTg5MH0.MnNTuoONyBTGZeO1qYyRUTtkRdFreK0OrOcYk66pWxs';
const {createClient}=supabase;const sb=createClient(SU,SK);
const PS=9;
let area=null,ft=null,fc=null,pg=0,total=0;
let sid=localStorage.getItem('mp_sid');if(!sid){sid=crypto.randomUUID();localStorage.setItem('mp_sid',sid);}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2400);}

function getArea(){try{return JSON.parse(localStorage.getItem('mp_area'));}catch{return null;}}

function openProf(bizId){
  localStorage.setItem('mp_view_biz',bizId);
  localStorage.setItem('mp_prof_back','home.html');
  window.location.href='profile.html';
}

function openLst(l){
  localStorage.setItem('mp_view_lst',JSON.stringify(l));
  localStorage.setItem('mp_lst_back','home.html');
  window.location.href='listing.html';
}

async function init(){
  area=getArea();
  if(!area){window.location.href='index.html';return;}
  document.getElementById('topnav-area').textContent=area.name;
  document.title='Businesses in '+area.name+' | MyPahad';
  sb.from('analytics').insert({area_id:area.id,event_type:'area_visit',session_id:sid});
  await Promise.all([loadStories(),loadAds(),loadListings()]);

  // Check if we should open a business profile directly
  const openBiz=localStorage.getItem('mp_open_biz');
  if(openBiz){localStorage.removeItem('mp_open_biz');openProf(openBiz);}
}

async function loadStories(){
  const r=document.getElementById('srow');
  r.innerHTML=[...Array(5)].map(()=>`<div class="si"><div class="sav shim" style="border:none;"></div><div class="shim" style="height:7px;width:36px;margin:3px auto;border-radius:2px;"></div></div>`).join('');
  const {data}=await sb.from('businesses').select('id,business_name,dp_url,is_premium').eq('area_id',area.id).eq('is_approved',true).eq('is_active',true).order('hearts',{ascending:false}).limit(20);
  r.innerHTML='';if(!data||!data.length){r.style.display='none';return;}
  data.forEach(b=>{
    const d=document.createElement('div');d.className='si';
    d.innerHTML=`<div class="sav">${b.dp_url?`<img src="${b.dp_url}" loading="lazy"/>`:`<div class="savph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a5c3a" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>`}</div><div class="snm">${b.business_name}</div>`;
    d.onclick=()=>openProf(b.id);r.appendChild(d);
  });
}

async function loadAds(){
  const now=new Date().toISOString();
  const {data}=await sb.from('ads').select('*').eq('area_id',area.id).eq('is_active',true).lte('starts_at',now).gte('ends_at',now);
  if(!data||!data.length)return;
  const bn=data.find(a=>a.ad_type==='banner');
  const sp=data.filter(a=>a.ad_type==='sponsored_product'||a.ad_type==='sponsored_service');
  if(bn&&bn.image_url){document.getElementById('adw').style.display='block';document.getElementById('adinner').innerHTML=`<img src="${bn.image_url}" alt="Ad" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:6px;"/>`;}
  if(sp.length){
    document.getElementById('sponw').style.display='block';
    const c=document.getElementById('sponlist');c.innerHTML='';
    for(const ad of sp){if(ad.listing_id){const {data:l}=await sb.from('listings').select('*,businesses(business_name)').eq('id',ad.listing_id).single();if(l)c.appendChild(mkHC(l));}}
  }
}

async function loadListings(){
  const g=document.getElementById('g3');
  g.innerHTML=[...Array(9)].map(()=>`<div class="gc"><div class="gcph shim" style="aspect-ratio:1;"></div><div class="gcb"><div class="shim" style="height:10px;border-radius:2px;margin-bottom:3px;"></div><div class="shim" style="height:8px;width:50%;border-radius:2px;"></div></div></div>`).join('');
  let q=sb.from('listings').select('*,businesses!inner(id,business_name,whatsapp,area_id,is_approved,is_active)',{count:'exact'}).eq('businesses.area_id',area.id).eq('businesses.is_approved',true).eq('businesses.is_active',true).eq('is_available',true).order('created_at',{ascending:false}).range(pg*PS,(pg+1)*PS-1);
  if(ft)q=q.eq('listing_type',ft);if(fc)q=q.eq('category_id',fc);
  const {data,count}=await q;
  total=count||0;g.innerHTML='';
  if(!data||!data.length){g.innerHTML='<div class="empty">No listings found.</div>';document.getElementById('pgrow').style.display='none';return;}
  data.forEach(l=>g.appendChild(mkGC(l)));
  document.getElementById('lstcnt').textContent=total+' items';
  renderPg();
}

function renderPg(){
  const tp=Math.ceil(total/PS);const pr=document.getElementById('pgrow');
  if(tp<=1){pr.style.display='none';return;}
  pr.style.display='flex';
  document.getElementById('pgprev').disabled=pg===0;
  document.getElementById('pgnext').disabled=pg>=tp-1;
  document.getElementById('pgi').textContent=(pg+1)+' / '+tp;
}

function changePg(d){pg+=d;loadListings();window.scrollTo(0,0);}

function setFilter(t,c,btn){
  ft=t;fc=c;pg=0;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('lstlbl').textContent=t==='product'?'Products':t==='service'?'Services':'All Listings';
  loadListings();
}

function mkGC(l){
  const c=document.createElement('div');c.className='gc';
  c.innerHTML=`${l.image_url?`<img class="gcimg" src="${l.image_url}" alt="${l.name}" loading="lazy"/>`:`<div class="gcph"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a5c3a" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`}<div class="gcb"><div class="gcn">${l.name}</div>${l.price?`<div class="gcp">${l.price}</div>`:''}<div class="gcbz">${l.businesses?.business_name||''}</div></div>`;
  c.onclick=()=>openLst(l);return c;
}

function mkHC(l){
  const c=document.createElement('div');c.className='hc';
  c.innerHTML=`${l.image_url?`<img class="hcimg" src="${l.image_url}" loading="lazy"/>`:`<div class="hcph"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a5c3a" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>`}<div class="hcb"><div class="hcn">${l.name}</div>${l.price?`<div class="hcprice">${l.price}</div>`:''}</div>`;
  c.onclick=()=>openLst(l);return c;
}

init();
</script>
</body>
</html>
